name: Apply EF Migrations (Supabase)

on:
  pull_request:
    types: [closed]
    branches: ["main"]

jobs:
  migrate:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    concurrency:
      group: db-migrations-main
      cancel-in-progress: false

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout merged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore DashyBoard.slnx

      - name: Build (Release)
        run: dotnet build DashyBoard.slnx -c Release

      - name: Install EF tools
        run: dotnet tool update --global dotnet-ef --version 10.*

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Print connection string (masked)
        run: echo "${{ secrets.SUPABASE_CONNECTION_STRING }}" | sed -E 's/(Password=)[^;]+/\1***HIDDEN***/Ig'

      - name: Run migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SUPABASE_CONNECTION_STRING }}
        run: |
          echo "Running EF migrations..."
          dotnet ef database update \
            --no-build \
            --configuration Release \
            --verbose \
            --project ./DashyBoard.Infrastructure/DashyBoard.Infrastructure.csproj \
            --startup-project ./DashyBoard.Api/DashyBoard.Api.csproj
